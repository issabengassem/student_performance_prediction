<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Performance Prediction</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f3f4f6;
      color: #111827;
    }

    header {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: white;
      padding: 35px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
    }

    header p {
      margin-top: 10px;
      color: #dbeafe;
    }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      margin-bottom: 25px;
    }

    h2 {
      margin-top: 0;
      color: #1e3a8a;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 7px;
      color: #374151;
    }

    input,
    select {
      width: 100%;
      padding: 11px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      background: white;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .actions {
      margin-top: 25px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    .btn-predict {
      background: #2563eb;
      color: white;
    }

    .btn-clear {
      background: #6b7280;
      color: white;
    }

    .btn-example {
      background: #16a34a;
      color: white;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      display: none;
      padding: 20px;
      border-radius: 14px;
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .success {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .loading {
      display: block;
      background: #dbeafe;
      color: #1e40af;
      border: 1px solid #93c5fd;
    }

    .api-box {
      background: #111827;
      color: #d1d5db;
      padding: 14px;
      border-radius: 10px;
      font-size: 14px;
      overflow-x: auto;
    }

    footer {
      text-align: center;
      color: #6b7280;
      padding: 20px;
    }

    @media (max-width: 900px) {
      .form-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      header h1 {
        font-size: 25px;
      }

      button {
        width: 100%;
      }
    }
  </style>

</head>

<body>
  <header>
    <h1>Student Performance Prediction</h1>
    <p>Predict the student grade class using your FastAPI machine learning model</p>

  <main class="container">
    <section class="card">
      <h2>Prediction Form</h2>

  </main>

  <footer>
    Student Performance Prediction Interface
  </footer>

  <script>
    const API_URL = "https://student-performance-prediction-x6t6.onrender.com";

    const form = document.getElementById("predictionForm");
    const resultBox = document.getElementById("resultBox");

    function getValue(id) {
      return document.getElementById(id).value;
    }

    function showResult(message, type) {
      resultBox.textContent = message;
      resultBox.className = "result " + type;
    }

    function clearForm() {
      form.reset();
      resultBox.className = "result";
      resultBox.textContent = "";
    }

    function fillExample() {
      document.getElementById("Age").value = 17;
      document.getElementById("Gender").value = 1;
      document.getElementById("Ethnicity").value = 0;
      document.getElementById("ParentalEducation").value = 2;
      document.getElementById("StudyTimeWeekly").value = 19.83;
      document.getElementById("Absences").value = 7;
      document.getElementById("Tutoring").value = 1;
      document.getElementById("ParentalSupport").value = 2;
      document.getElementById("Extracurricular").value = 0;
      document.getElementById("Sports").value = 0;
      document.getElementById("Music").value = 1;
      document.getElementById("Volunteering").value = 0;
    }

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      showResult("Prediction in progress...", "loading");

      const params = new URLSearchParams({
        Age: getValue("Age"),
        Gender: getValue("Gender"),
        Ethnicity: getValue("Ethnicity"),
        ParentalEducation: getValue("ParentalEducation"),
        StudyTimeWeekly: getValue("StudyTimeWeekly"),
        Absences: getValue("Absences"),
        Tutoring: getValue("Tutoring"),
        ParentalSupport: getValue("ParentalSupport"),
        Extracurricular: getValue("Extracurricular"),
        Sports: getValue("Sports"),
        Music: getValue("Music"),
        Volunteering: getValue("Volunteering")
      });

      try {
        const response = await fetch(`${API_URL}/predict?${params.toString()}`);

        if (!response.ok) {
          throw new Error("API request failed. Please check if the Render API is running.");
        }

        const data = await response.json();

        const predictedGrade =
          data["الدرجة المتوقعة"] ||
          data.prediction ||
          data.result ||
          JSON.stringify(data);

        showResult(`Predicted Grade: ${predictedGrade}`, "success");

      } catch (error) {
        showResult(`Error: ${error.message}`, "error");
      }
    });
  </script>

</body>
</html>
